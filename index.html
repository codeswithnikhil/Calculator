<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funny Calculator - Nikhil Kumar</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.calculator {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    width: 300px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

.title {
    color: white;
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    color: #ddd;
    font-size: 12px;
    text-align: center;
    margin-bottom: 15px;
}

.display {
    width: 100%;
    height: 50px;
    border: none;
    border-radius: 10px;
    margin-bottom: 15px;
    padding: 10px;
    font-size: 20px;
    text-align: right;
    background: rgba(255,255,255,0.2);
    color: white;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 50px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #ff7eb3;
    transform: scale(1.05);
}

.equal {
    background: #00c9a7;
}

.clear {
    background: #ff4d4d;
}

.span2 {
    grid-column: span 2;
    height: 100%;
}
</style>
</head>

<body>

<div class="calculator">
    <h2 class="title">😂 Funny Calculator</h2>
    <div class="subtitle">by Nikhil Kumar</div>

    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
        <!-- Row 1 -->
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="backspace()">⌫</button>
        <button onclick="add('.')">.</button>
        <button onclick="add('/')">÷</button>

        <!-- Row 2 -->
        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button onclick="add('*')">×</button>

        <!-- Row 3 -->
        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button onclick="add('-')">−</button>

        <!-- Row 4 -->
        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button onclick="add('+')">+</button>

        <!-- Row 5 -->
        <button onclick="add('0')">0</button>
        <button onclick="add('00')">00</button>
        <button class="equal span2" onclick="calculate()">=</button>
    </div>
</div>

<script>
const display = document.getElementById("display");

function add(value) {
    display.value += value;
}

function clearDisplay() {
    display.value = "";
}

function backspace() {
    display.value = display.value.slice(0, -1);
}

function calculate() {
    const input = display.value;

    const funnyResults = [
        "😂 Nope!",
        "🤯 Brain crash!",
        "💔 Not your luck!",
        "42 😎",
        "🙃 Try again bro",
        "📱 Ask your teacher!",
        "😴 I'm sleeping!",
        "🚫 Not allowed!"
    ];

    let chance = Math.random();

    if (chance < 0.65) {
        try {
            display.value = Function("return " + input)();
        } catch {
            display.value = "❌ Error";
        }
    } else {
        let random = Math.floor(Math.random() * funnyResults.length);
        display.value = funnyResults[random];
    }
}

// Keyboard support
document.addEventListener("keydown", function(e) {
    if (!isNaN(e.key) || "+-*/.".includes(e.key)) {
        add(e.key);
    } else if (e.key === "Enter") {
        calculate();
    } else if (e.key === "Backspace") {
        backspace();
    } else if (e.key.toLowerCase() === "c") {
        clearDisplay();
    }
});
</script>

</body>
</html>
